<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Futuristic Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            margin: 0;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .nexus-form {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 30px;
            margin-bottom: 50px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #94a3b8;
        }

        input, textarea, select {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: white;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 20px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .btn-deploy {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-deploy:hover {
            opacity: 0.9;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .knowledge-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .knowledge-card:hover {
            background: rgba(255,255,255,0.06);
        }

        .category-tag {
            font-size: 0.7rem;
            background: var(--primary);
            padding: 4px 10px;
            border-radius: 50px;
            text-transform: uppercase;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-brain"></i> Nexus AI</h1>
        <p style="color: #94a3b8;">Intelligent Educational Hub for Eleonora Fiseiska</p>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <i class="fas fa-database" style="color: var(--primary); font-size: 24px;"></i>
            <h3>{{ count }}</h3>
            <p>Stored Materials</p>
        </div>
        <div class="stat-card">
            <i class="fas fa-microchip" style="color: var(--accent); font-size: 24px;"></i>
            <h3>Active</h3>
            <p>AI Engine Status</p>
        </div>
    </div>

    <div class="nexus-form">
        <h2 style="margin-top:0"><i class="fas fa-plus-circle"></i> Deploy New Knowledge</h2>
        <form action="{{ url_for('deploy') }}" method="post">
            <label for="category">Knowledge Category</label>
            <select name="category" id="category">
                <option value="IT">Information Technology</option>
                <option value="AI">Artificial Intelligence</option>
                <option value="DESIGN">Design & UI/UX</option>
            </select>

            <label for="topic">Topic Title</label>
            <input type="text" name="topic" id="topic" placeholder="Enter subject name..." required>

            <label for="content">Deep Insights</label>
            <textarea name="content" id="content" rows="4" placeholder="Describe the educational content..." required></textarea>

            <button type="submit" class="btn-deploy">Store in Nexus Vault</button>
        </form>
    </div>

    <h2 style="text-align: center; margin-bottom: 30px;">Knowledge Repository</h2>
    <div class="knowledge-grid">
        {% for item in items %}
        <div class="knowledge-card">
            <span class="category-tag">{{ item[3] }}</span>
            <h3 style="color: var(--primary); margin: 15px 0 10px 0;">{{ item[1] }}</h3>
            <p style="color: #94a3b8; font-size: 0.95rem; line-height: 1.6;">{{ item[2] }}</p>
            <div style="font-size: 0.8rem; color: #475569; margin-top: 20px;">
                <i class="fas fa-fingerprint"></i> Node ID: {{ item[0] }}
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
